<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <main>
      <table border="1">
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
        <tr>
          <td>Alice</td>
          <td>30</td>
          <td>New York</td>
        </tr>
        <tr>
          <td>Bob</td>
          <td>25</td>
          <td>Los Angeles</td>
        </tr>
        <tr>
          <td>Charlie</td>
          <td>35</td>
          <td>Chicago</td>
        </tr>
      </table>
    </main>
    <p></p>
    <table border="1">
      <tr>
        <th>Student Name</th>
        <th>Math Score</th>
        <th>Science Score</th>
      </tr>
      <tr>
        <td>Marie</td>
        <td>85</td>
        <td>92</td>
      </tr>
      <tr>
        <td>John</td>
        <td>78</td>
        <td>88</td>
      </tr>
    </table>

    <p></p>
    <table border="1">
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Quantity</th>
      </tr>
      <p></p>

      <tbody>
        <tr>
          <td>Notebook</td>
          <td>$3.50</td>
          <td>5</td>
        </tr>
        <tr>
          <td>Pencil</td>
          <td>$0.75</td>
          <td>12</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <td>Total Items</td>
          <td>$26.50</td>
          <td>17</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>

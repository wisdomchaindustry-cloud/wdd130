<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Quiz Form</title>
    <link rel="stylesheet" href="quiz1.css" />
  </head>
  <body>
    <main>
      <h1>✅Basic HTML and CSS Quiz Form</h1>
      <form class="box" action="">
        <div class="quiz-item">
          <label for="q1"
            >1.What does the acronym CSS stand for?
            <input type="text" id="q1" name="q1" required />
          </label>
        </div>
        <div class="quiz-item">
          <label for="q2"
            >2.How are id and class attributes selected in CSS?
            <textarea id="q2" name="q2" rows="5"></textarea>
          </label>
        </div>
        <div class="quiz-item">
          <label for="q3"
            >3.Which of the following is a valid CSS selector?
            <input type="text" id="q3" name="q3" />
            <select name="" id="">
              <option value="">Choose One ...</option>
              <option value="wrong1">// This is a comment</option>
              <option value="correct">/* This is a comment */</option>
              <option value="wrong2">&lt;!-- This is a comment --&gt;</option>
            </select>
          </label>
        </div>
        <div class="quiz-item">
          <label for="q4"
            >4.What is the bottom margin of an element?
            <code class="box">margin: 10px 5px 15px</code>
            <input type="text" id="q4" name="q4" />
            <textarea name="text" id="4">Enter your answer here...</textarea>
          </label>
        </div>
        <button type="submit">Submit My Quiz for grading</button>
      </form>
    </main>
  </body>
</html>

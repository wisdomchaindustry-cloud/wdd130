<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WDD 130 | HTML Form - User Poll</title>
    <link rel="stylesheet" href="styles/poll1-form.css" />
  </head>

  <body>
    <main>
      <h2>WDD 130 | HTML Form - User Poll</h2>

      <form>
        <!-- ================= Contact Information ================= -->
        <fieldset>
          <legend>Contact Information</legend>

          <div class="form-item">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" />
          </div>

          <div class="form-item">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />
          </div>
        </fieldset>

        <!-- ================= Questions ================= -->
        <fieldset class="questions">
          <legend>Questions</legend>

          <div class="form-item">
            <label for="browser">What is your favorite internet browser?</label>
            <select id="browser" name="browser">
              <option value="chrome">Chrome</option>
              <option value="firefox">Firefox</option>
              <option value="edge">Edge</option>
              <option value="brave">Brave</option>
            </select>
          </div>

          <div class="checkbox">
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet" />
          </div>

          <div class="textarea">
            <label for="places">List the places you have lived:</label>
            <textarea id="places" name="places" rows="3">
Stillwater Florida, Amsterdam Netherlands, Timbuktu Mali
          </textarea
            >
          </div>
        </fieldset>

        <!-- ================= Submit Button ================= -->
        <button type="submit">Submit Poll</button>
      </form>

      <!-- ================= Footer ================= -->
      <footer>
        <p>©2026 | HTML Form - User Poll Activity | Francis Ime</p>
      </footer>
    </main>
  </body>
</html>
